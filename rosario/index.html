<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rosario Interactivo · Lalo Peralta</title>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ========== ESTILOS (igual al index principal) ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --azul:       #185FA5;
      --azul-claro: #E6F1FB;
      --azul-mid:   #378ADD;
      --texto:      #1a1a1a;
      --texto-muted:#6b7280;
      --borde:      rgba(0,0,0,0.08);
      --borde-hover:rgba(0,0,0,0.18);
      --fondo:      #ffffff;
      --fondo-sec:  #f8f9fa;
      --radio-card: 12px;
      --radio-sm:   8px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #1a2a5e 0%, #294197 50%, #3d5bb8 100%);
      background-attachment: fixed;
      color: var(--texto);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 70%);
      animation: shine 15s linear infinite;
      pointer-events: none;
    }

    @keyframes shine {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      background: var(--fondo);
      border-bottom: 1px solid var(--borde);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Crimson Pro', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--texto);
    }
    .logo span { color: var(--azul); }

    .btn-volver {
      background: transparent;
      border: 1px solid var(--borde-hover);
      padding: 0.4rem 1rem;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      color: var(--texto);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .btn-volver:hover {
      background: var(--fondo-sec);
      border-color: var(--azul);
      color: var(--azul);
    }

    .rosario-container {
      max-width: 900px;
      margin: 2rem auto;
      padding: 1rem;
      position: relative;
      z-index: 1;
    }
    .rosario-card {
      background: linear-gradient(135deg, #ffffff 0%, #f0f4ff 100%);
      border-radius: 28px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
      padding: 1.8rem;
      border: 1px solid rgba(41, 65, 151, 0.2);
    }
    .rosario-header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .rosario-header h1 {
      font-family: 'Crimson Pro', serif;
      font-size: 2rem;
      color: var(--azul);
    }
    .misterio-actual {
      font-size: 0.85rem;
      color: var(--texto-muted);
      margin-top: 0.3rem;
    }
    .selectores {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 1rem;
    }
    .selectores select {
      background: var(--fondo);
      border: 1px solid var(--borde-hover);
      border-radius: 30px;
      padding: 0.4rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      color: var(--texto);
    }
    .oracion-area {
      background: var(--fondo-sec);
      border-radius: 20px;
      padding: 1.5rem;
      margin: 1rem 0;
      min-height: 320px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .oracion-title {
      font-family: 'Crimson Pro', serif;
      font-size: 1.5rem;
      color: var(--azul);
      margin-bottom: 1rem;
      text-align: center;
    }
    .oracion-texto {
      font-family: 'Crimson Pro', serif;
      font-size: 1.2rem;
      line-height: 1.6;
      text-align: center;
      white-space: pre-wrap;
      color: var(--texto);
    }
    .reflexion {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 2px solid rgba(41, 65, 151, 0.15);
      font-size: 0.95rem;
      font-style: italic;
      color: var(--azul-mid);
      text-align: center;
    }
    .cuentas-area {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 1rem 0;
    }
    .cuenta {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(41, 65, 151, 0.1);
      border: 2px solid var(--azul);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: var(--azul);
      transition: all 0.3s;
    }
    .cuenta.active {
      background: var(--azul);
      color: white;
      transform: scale(1.1);
      box-shadow: 0 0 10px rgba(24, 95, 165, 0.5);
    }
    .cuenta.completada {
      background: var(--azul-claro);
      border-color: var(--azul-mid);
      color: var(--azul-mid);
      opacity: 0.7;
    }
    .controles-rosario {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .btn-rosario {
      padding: 0.7rem 1.5rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-primary-rosario {
      background: var(--azul);
      color: white;
      box-shadow: 0 4px 10px rgba(24, 95, 165, 0.3);
    }
    .btn-primary-rosario:hover {
      background: #0d4d8a;
      transform: translateY(-2px);
    }
    .btn-secundario {
      background: transparent;
      border: 1px solid var(--azul);
      color: var(--azul);
    }
    .btn-secundario:hover {
      background: var(--azul-claro);
    }
    .mensaje {
      text-align: center;
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: var(--texto-muted);
    }
    @media (max-width: 640px) {
      .rosario-card { padding: 1.2rem; }
      .oracion-texto { font-size: 1rem; }
      .oracion-title { font-size: 1.2rem; }
      .cuenta { width: 32px; height: 32px; font-size: 0.8rem; }
      .btn-rosario { padding: 0.5rem 1rem; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="logo">Lalo <span>Peralta</span></div>
  <a href="../index.html" class="btn-volver"><i class="fas fa-arrow-left"></i> Volver al inicio</a>
</nav>

      <div id="oracion-texto" class="oracion-texto"></div>
      <div id="reflexion-fragmento" class="reflexion"></div>
    </div>

    <div id="cuentas-container" class="cuentas-area"></div>
    <div id="contador-texto" class="mensaje"></div>

    <div class="controles-rosario">

      <button id="btn-reiniciar" class="btn-rosario btn-secundario"><i class="fas fa-sync-alt"></i> Reiniciar</button>
    </div>
  </div>
</div>

  // ==================== LÓGICA DE SECUENCIA ====================
  let idiomaActual = 'es';
  let misterioActual = 'joyful';
  let secuencia = [];
  let indiceActual = -1;

  const oracionTitle = document.getElementById('oracion-title');
  const oracionTexto = document.getElementById('oracion-texto');
  const reflexionDiv = document.getElementById('reflexion-fragmento');
  const cuentasContainer = document.getElementById('cuentas-container');
  const contadorTexto = document.getElementById('contador-texto');
  const btnAnterior = document.getElementById('btn-anterior');
  const btnSiguiente = document.getElementById('btn-siguiente');
  const btnReiniciar = document.getElementById('btn-reiniciar');
  const idiomaSelect = document.getElementById('idioma-select');
  const misterioSelect = document.getElementById('misterio-select');
  const infoMisterio = document.getElementById('info-misterio');

  function construirSecuencia() {
    const lang = rosarioContent[idiomaActual];
    const misteriosList = lang.mysteries[misterioActual];
    const seq = [];

    // Oraciones iniciales
    seq.push({ tipo: 'oracion', key: 'sign_of_cross', titulo: 'Señal de la Cruz', texto: lang.prayers.sign_of_cross });
    seq.push({ tipo: 'oracion', key: 'versicle', titulo: 'Versículo inicial', texto: lang.prayers.versicle });
    seq.push({ tipo: 'oracion', key: 'creed', titulo: 'Credo', texto: lang.prayers.creed });
    for (let i = 0; i < 3; i++) seq.push({ tipo: 'oracion', key: 'hail_mary', titulo: 'Ave María', texto: lang.prayers.hail_mary });
    seq.push({ tipo: 'oracion', key: 'gloria', titulo: 'Gloria', texto: lang.prayers.gloria });

    // 5 misterios
    for (let m = 0; m < misteriosList.length; m++) {
      const misterio = misteriosList[m];
      // Anuncio del misterio
      seq.push({ tipo: 'anuncio', titulo: misterio.title });
      // Padre Nuestro (fragmento 0)
      seq.push({ tipo: 'oracion', key: 'our_father', titulo: 'Padre Nuestro', texto: lang.prayers.our_father, fragmento: misterio.fragments[0] });
      // 10 Avemarías (fragmentos 1 a 10)
      for (let a = 1; a <= 10; a++) {
        seq.push({ tipo: 'oracion', key: 'hail_mary', titulo: 'Ave María', texto: lang.prayers.hail_mary, fragmento: misterio.fragments[a] });
      }
      seq.push({ tipo: 'oracion', key: 'gloria', titulo: 'Gloria', texto: lang.prayers.gloria });
      seq.push({ tipo: 'oracion', key: 'fatima_prayer', titulo: 'Oración de Fátima', texto: lang.prayers.fatima_prayer });
    }

    // Oraciones finales
    seq.push({ tipo: 'oracion', key: 'salve_regina', titulo: 'Salve Regina', texto: lang.prayers.salve_regina });
    seq.push({ tipo: 'oracion', key: 'pope_intentions', titulo: 'Intenciones del Papa', texto: lang.prayers.pope_intentions });
    seq.push({ tipo: 'oracion', key: 'our_father', titulo: 'Padre Nuestro', texto: lang.prayers.our_father });
    seq.push({ tipo: 'oracion', key: 'hail_mary', titulo: 'Ave María', texto: lang.prayers.hail_mary });
    seq.push({ tipo: 'oracion', key: 'gloria', titulo: 'Gloria', texto: lang.prayers.gloria });
    seq.push({ tipo: 'oracion', key: 'final_sign_of_cross', titulo: 'Señal de la Cruz final', texto: lang.prayers.final_sign_of_cross });

    return seq;
  }

  function actualizarUI() {
    if (indiceActual < 0 || indiceActual >= secuencia.length) {
      oracionTitle.textContent = "Santo Rosario";
      oracionTexto.textContent = "Presiona 'Siguiente' para comenzar.";
      reflexionDiv.textContent = "";
      cuentasContainer.innerHTML = "";
      contadorTexto.textContent = "Inicio";
      btnSiguiente.textContent = "Comenzar";
      btnAnterior.disabled = true;
      if (indiceActual >= secuencia.length) {
        oracionTitle.textContent = "¡Rosario completado!";
        oracionTexto.textContent = "Has rezado todas las oraciones. Que Dios te bendiga.";
        btnSiguiente.textContent = "Reiniciar";
      }
      return;
    }

    const paso = secuencia[indiceActual];
    if (paso.tipo === 'anuncio') {
      oracionTitle.textContent = paso.titulo;
      oracionTexto.textContent = "Medita este misterio mientras rezas...";
      reflexionDiv.textContent = `📖 ${secuencia[indiceActual+1]?.fragmento || ''}`;
      cuentasContainer.innerHTML = "";
      contadorTexto.textContent = "";
    } else if (paso.tipo === 'oracion') {
      oracionTitle.textContent = paso.titulo;
      oracionTexto.textContent = paso.texto;
      reflexionDiv.textContent = paso.fragmento ? `📖 ${paso.fragmento}` : "";

      // Mostrar cuentas para Padre Nuestro y Avemarías dentro de un misterio
      if (paso.key === 'our_father' || paso.key === 'hail_mary') {
        const total = 11; // 1 Padre + 10 Avemarías
        let actual = 0;
        if (paso.key === 'our_father') actual = 1;
        else {
          let cont = 0;
          for (let i = indiceActual; i >= 0; i--) {
            if (secuencia[i].key === 'our_father') break;
            if (secuencia[i].key === 'hail_mary') cont++;
          }
          actual = cont + 1;
        }
        cuentasContainer.innerHTML = '';
        for (let i = 1; i <= total; i++) {
          const div = document.createElement('div');
          div.className = 'cuenta';
          if (i === actual) div.classList.add('active');
          else if (i < actual) div.classList.add('completada');
          div.textContent = i === 1 ? 'P' : i-1;
          cuentasContainer.appendChild(div);
        }
        contadorTexto.textContent = `${actual} de ${total}`;
      } else {
        cuentasContainer.innerHTML = '';
        contadorTexto.textContent = '';
      }
    }

    btnAnterior.disabled = (indiceActual === 0);
    btnSiguiente.textContent = (indiceActual === secuencia.length-1) ? "Finalizar" : "Siguiente";
  }

  function avanzar() {
    if (indiceActual < secuencia.length - 1) {
      indiceActual++;
      actualizarUI();
    } else if (indiceActual === secuencia.length - 1) {
      indiceActual = -1;
      actualizarUI();
    } else {
      indiceActual = 0;
      actualizarUI();
    }
  }
  function retroceder() {
    if (indiceActual > 0) {
      indiceActual--;
      actualizarUI();
    }
  }
  function reiniciar() {
    indiceActual = -1;
    actualizarUI();
  }
  function cargarTodo() {
    secuencia = construirSecuencia();
    indiceActual = -1;
    actualizarUI();
    const misterioNombre = rosarioContent[idiomaActual].mysteries[misterioActual][0]?.title.split('.')[0] || '';
    infoMisterio.textContent = `Misterios ${misterioActual === 'joyful' ? 'Gozosos' : misterioActual === 'luminous' ? 'Luminosos' : misterioActual === 'sorrowful' ? 'Dolorosos' : 'Gloriosos'}`;
  }

  // Eventos
  idiomaSelect.addEventListener('change', (e) => { idiomaActual = e.target.value; cargarTodo(); });
  misterioSelect.addEventListener('change', (e) => { misterioActual = e.target.value; cargarTodo(); });
  btnSiguiente.addEventListener('click', avanzar);
  btnAnterior.addEventListener('click', retroceder);
  btnReiniciar.addEventListener('click', reiniciar);

  cargarTodo();
</script>
</body>
