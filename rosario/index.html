<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rosario Interactivo · Lalo Peralta</title>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* ========== ESTILOS (igual al index principal) ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --azul:       #185FA5;
      --azul-claro: #E6F1FB;
      --azul-mid:   #378ADD;
      --texto:      #1a1a1a;
      --texto-muted:#6b7280;
      --borde:      rgba(0,0,0,0.08);
      --borde-hover:rgba(0,0,0,0.18);
      --fondo:      #ffffff;
      --fondo-sec:  #f8f9fa;
      --radio-card: 12px;
      --radio-sm:   8px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #1a2a5e 0%, #294197 50%, #3d5bb8 100%);
      background-attachment: fixed;
      color: var(--texto);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, transparent 70%);
      animation: shine 15s linear infinite;
      pointer-events: none;
    }

    @keyframes shine {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.25rem;
      background: var(--fondo);
      border-bottom: 1px solid var(--borde);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Crimson Pro', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--texto);
    }
    .logo span { color: var(--azul); }

    .btn-volver {
      background: transparent;
      border: 1px solid var(--borde-hover);
      padding: 0.4rem 1rem;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      color: var(--texto);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .btn-volver:hover {
      background: var(--fondo-sec);
      border-color: var(--azul);
      color: var(--azul);
    }

    .rosario-container {
      max-width: 900px;
      margin: 2rem auto;
      padding: 1rem;
      position: relative;
      z-index: 1;
    }
    .rosario-card {
      background: linear-gradient(135deg, #ffffff 0%, #f0f4ff 100%);
      border-radius: 28px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
      padding: 1.8rem;
      border: 1px solid rgba(41, 65, 151, 0.2);
    }
    .rosario-header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .rosario-header h1 {
      font-family: 'Crimson Pro', serif;
      font-size: 2rem;
      color: var(--azul);
    }
    .misterio-actual {
      font-size: 0.85rem;
      color: var(--texto-muted);
      margin-top: 0.3rem;
    }
    .selectores {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 1rem;
    }
    .selectores select {
      background: var(--fondo);
      border: 1px solid var(--borde-hover);
      border-radius: 30px;
      padding: 0.4rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      color: var(--texto);
    }
    .oracion-area {
      background: var(--fondo-sec);
      border-radius: 20px;
      padding: 1.5rem;
      margin: 1rem 0;
      min-height: 320px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .oracion-title {
      font-family: 'Crimson Pro', serif;
      font-size: 1.5rem;
      color: var(--azul);
      margin-bottom: 1rem;
      text-align: center;
    }
    .oracion-texto {
      font-family: 'Crimson Pro', serif;
      font-size: 1.2rem;
      line-height: 1.6;
      text-align: center;
      white-space: pre-wrap;
      color: var(--texto);
    }
    .reflexion {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 2px solid rgba(41, 65, 151, 0.15);
      font-size: 0.95rem;
      font-style: italic;
      color: var(--azul-mid);
      text-align: center;
    }
    .cuentas-area {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin: 1rem 0;
    }
    .cuenta {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(41, 65, 151, 0.1);
      border: 2px solid var(--azul);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: var(--azul);
      transition: all 0.3s;
    }
    .cuenta.active {
      background: var(--azul);
      color: white;
      transform: scale(1.1);
      box-shadow: 0 0 10px rgba(24, 95, 165, 0.5);
    }
    .cuenta.completada {
      background: var(--azul-claro);
      border-color: var(--azul-mid);
      color: var(--azul-mid);
      opacity: 0.7;
    }
    .controles-rosario {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .btn-rosario {
      padding: 0.7rem 1.5rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.9rem;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-primary-rosario {
      background: var(--azul);
      color: white;
      box-shadow: 0 4px 10px rgba(24, 95, 165, 0.3);
    }
    .btn-primary-rosario:hover {
      background: #0d4d8a;
      transform: translateY(-2px);
    }
    .btn-secundario {
      background: transparent;
      border: 1px solid var(--azul);
      color: var(--azul);
    }
    .btn-secundario:hover {
      background: var(--azul-claro);
    }
    .mensaje {
      text-align: center;
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: var(--texto-muted);
    }
    @media (max-width: 640px) {
      .rosario-card { padding: 1.2rem; }
      .oracion-texto { font-size: 1rem; }
      .oracion-title { font-size: 1.2rem; }
      .cuenta { width: 32px; height: 32px; font-size: 0.8rem; }
      .btn-rosario { padding: 0.5rem 1rem; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="logo">Lalo <span>Peralta</span></div>
  <a href="../index.html" class="btn-volver"><i class="fas fa-arrow-left"></i> Volver al inicio</a>
</nav>

<div class="rosario-container">
  <div class="rosario-card">
    <div class="rosario-header">
      <h1><i class="fas fa-praying-hands"></i> Santo Rosario</h1>
      <div class="misterio-actual" id="info-misterio"></div>
    </div>

    <div class="selectores">
      <select id="idioma-select">
        <option value="es">🇪🇸 Español</option>
        <!-- Puedes añadir italiano y latín después -->
      </select>
      <select id="misterio-select">
        <option value="joyful">🌹 Misterios Gozosos (Lun/Sáb)</option>
        <option value="luminous">💡 Misterios Luminosos (Jue)</option>
        <option value="sorrowful">✝️ Misterios Dolorosos (Mar/Vie)</option>
        <option value="glorious">👑 Misterios Gloriosos (Mié/Dom)</option>
      </select>
    </div>

    <div id="oracion-area" class="oracion-area">
      <div id="oracion-title" class="oracion-title"></div>
      <div id="oracion-texto" class="oracion-texto"></div>
      <div id="reflexion-fragmento" class="reflexion"></div>
    </div>

    <div id="cuentas-container" class="cuentas-area"></div>
    <div id="contador-texto" class="mensaje"></div>

    <div class="controles-rosario">
      <button id="btn-anterior" class="btn-rosario btn-secundario"><i class="fas fa-chevron-left"></i> Anterior</button>
      <button id="btn-siguiente" class="btn-rosario btn-primary-rosario">Siguiente <i class="fas fa-chevron-right"></i></button>
      <button id="btn-reiniciar" class="btn-rosario btn-secundario"><i class="fas fa-sync-alt"></i> Reiniciar</button>
    </div>
  </div>
</div>

<script>
  // ==================== CONTENIDO COMPLETO EN ESPAÑOL ====================
  const rosarioContent = {
    es: {
      prayers: {
        sign_of_cross: "Por la señal de la Santa Cruz, de nuestros enemigos, líbranos Señor, Dios nuestro.\nEn el nombre del Padre, y del Hijo, y del Espíritu Santo. Amén.",
        versicle: "V. Dios mío, ven en mi auxilio.\nR. Señor, date prisa en socorrerme.",
        creed: "Creo en Dios, Padre todopoderoso, Creador del cielo y de la tierra.\nCreo en Jesucristo, su único Hijo, nuestro Señor, que fue concebido por obra y gracia del Espíritu Santo, nació de Santa María Virgen, padeció bajo el poder de Poncio Pilato, fue crucificado, muerto y sepultado, descendió a los infiernos, al tercer día resucitó de entre los muertos, subió a los cielos y está sentado a la derecha de Dios, Padre todopoderoso. Desde allí ha de venir a juzgar a vivos y muertos.\nCreo en el Espíritu Santo, la santa Iglesia católica, la comunión de los santos, el perdón de los pecados, la resurrección de la carne y la vida eterna. Amén.",
        our_father: "Padre nuestro, que estás en el cielo, santificado sea tu Nombre; venga a nosotros tu reino; hágase tu voluntad, en la tierra como en el cielo.\nDanos hoy nuestro pan de cada día; perdona nuestras ofensas, como también nosotros perdonamos a los que nos ofenden; no nos dejes caer en la tentación y líbranos del mal. Amén.",
        hail_mary: "Dios te salve, María, llena eres de gracia; el Señor es contigo. Bendita Tú eres entre todas las mujeres, y bendito es el fruto de tu vientre, Jesús.\nSanta María, Madre de Dios, ruega por nosotros, pecadores, ahora y en la hora de nuestra muerte. Amén.",
        gloria: "Gloria al Padre, y al Hijo, y al Espíritu Santo.\nComo era en el principio, ahora y siempre, por los siglos de los siglos. Amén.",
        fatima_prayer: "Oh, Jesús mío, perdona nuestros pecados, líbranos del fuego del infierno, lleva al cielo a todas las almas, especialmente a las más necesitadas de tu divina misericordia.",
        salve_regina: "Dios te salve, Reina y Madre de misericordia, vida, dulzura y esperanza nuestra; Dios te salve.\nA Ti llamamos los desterrados hijos de Eva; a Ti suspiramos, gimiendo y llorando, en este valle de lágrimas.\nEa, pues, Señora, abogada nuestra, vuelve a nosotros esos tus ojos misericordiosos; y después de este destierro, muéstranos a Jesús, fruto bendito de tu vientre.\n¡Oh clemente, oh piadosa, oh dulce siempre Virgen María!\nRuega por nosotros, Santa Madre de Dios, para que seamos dignos de alcanzar las promesas de Nuestro Señor Jesucristo. Amén.",
        pope_intentions: "Por las intenciones del Santo Padre, por la Santa Iglesia y por nuestras necesidades.",
        final_sign_of_cross: "En el nombre del Padre, y del Hijo, y del Espíritu Santo. Amén."
      },
      mysteries: {
        joyful: {
          title: "Misterios Gozosos",
          fragments: [
            "1. La Anunciación: «He aquí la esclava del Señor; hágase en mí según tu palabra.» (Lucas 1,38)",
            "2. La Visitación: «Bendita tú entre las mujeres y bendito el fruto de tu vientre... Feliz la que ha creído.» (Lucas 1,42-45)",
            "3. El Nacimiento de Jesús: «Os ha nacido hoy un Salvador, que es el Cristo Señor.» (Lucas 2,11)",
            "4. La Presentación en el Templo: «Mis ojos han visto tu salvación, luz para iluminar a las naciones.» (Lucas 2,30-32)",
            "5. El Niño perdido y hallado: «¿No sabíais que yo debía estar en la casa de mi Padre?» (Lucas 2,49)",
            "6. (1ª Avemaría) María guardaba todas estas cosas en su corazón. (Lucas 2,19)",
            "7. (2ª Avemaría) Jesús crecía en sabiduría, en estatura y en gracia. (Lucas 2,52)",
            "8. (3ª Avemaría) El Espíritu Santo vendrá sobre ti. (Lucas 1,35)",
            "9. (4ª Avemaría) Dichosa la que ha creído. (Lucas 1,45)",
            "10. (5ª Avemaría) Mi espíritu se alegra en Dios mi Salvador. (Lucas 1,47)",
            "11. (6ª Avemaría) Su misericordia llega a sus fieles de generación en generación. (Lucas 1,50)"
          ]
        },
        luminous: {
          title: "Misterios Luminosos",
          fragments: [
            "1. El Bautismo de Jesús: «Este es mi Hijo amado, en quien me complazco.» (Mateo 3,17)",
            "2. Las Bodas de Caná: «Haced lo que Él os diga.» (Juan 2,5)",
            "3. El anuncio del Reino: «Convertíos y creed en la Buena Nueva.» (Marcos 1,15)",
            "4. La Transfiguración: «Se transfiguró delante de ellos, su rostro brilló como el sol.» (Mateo 17,2)",
            "5. La Institución de la Eucaristía: «Tomad y comed, esto es mi Cuerpo.» (Mateo 26,26)",
            "6. (1ª Avemaría) La luz verdadera que ilumina a todo hombre. (Juan 1,9)",
            "7. (2ª Avemaría) Yo soy la luz del mundo. (Juan 8,12)",
            "8. (3ª Avemaría) Vosotros sois la sal de la tierra. (Mateo 5,13)",
            "9. (4ª Avemaría) Dejad que los niños vengan a mí. (Marcos 10,14)",
            "10. (5ª Avemaría) El que me sigue no andará en tinieblas. (Juan 8,12)",
            "11. (6ª Avemaría) Yo he venido para que tengan vida. (Juan 10,10)"
          ]
        },
        sorrowful: {
          title: "Misterios Dolorosos",
          fragments: [
            "1. La Oración en el Huerto: «Padre, si quieres, aparta de mí esta copa; pero no se haga mi voluntad, sino la tuya.» (Lucas 22,42)",
            "2. La Flagelación: «Tomó Pilato a Jesús y mandó azotarle.» (Juan 19,1)",
            "3. La Coronación de espinas: «¡Salve, Rey de los judíos!» (Juan 19,3)",
            "4. El Camino del Calvario: «Cargando su cruz, salió al Gólgota.» (Juan 19,17)",
            "5. La Crucifixión y muerte: «Padre, en tus manos encomiendo mi espíritu.» (Lucas 23,46)",
            "6. (1ª Avemaría) Por tus llagas fuimos curados. (Isaías 53,5)",
            "7. (2ª Avemaría) Jesús, acuérdate de mí cuando llegues a tu Reino. (Lucas 23,42)",
            "8. (3ª Avemaría) Mujer, ahí tienes a tu hijo. (Juan 19,26)",
            "9. (4ª Avemaría) Todo está cumplido. (Juan 19,30)",
            "10. (5ª Avemaría) La tierra tembló y las rocas se partieron. (Mateo 27,51)",
            "11. (6ª Avemaría) Verdaderamente este era Hijo de Dios. (Mateo 27,54)"
          ]
        },
        glorious: {
          title: "Misterios Gloriosos",
          fragments: [
            "1. La Resurrección: «Ha resucitado, no está aquí.» (Marcos 16,6)",
            "2. La Ascensión: «Fue elevado al cielo y está sentado a la derecha de Dios.» (Marcos 16,19)",
            "3. Pentecostés: «Quedaron todos llenos del Espíritu Santo.» (Hechos 2,4)",
            "4. La Asunción de María: «Ha hecho en mí maravillas el Poderoso.» (Lucas 1,49)",
            "5. La Coronación de María: «Una gran señal apareció en el cielo: una Mujer vestida de sol.» (Apocalipsis 12,1)",
            "6. (1ª Avemaría) Alégrate, llena de gracia, el Señor está contigo. (Lucas 1,28)",
            "7. (2ª Avemaría) Dichoso el vientre que te llevó. (Lucas 11,27)",
            "8. (3ª Avemaría) María conservaba todas estas cosas en su corazón. (Lucas 2,51)",
            "9. (4ª Avemaría) Tú eres la gloria de Jerusalén. (Judit 15,9)",
            "10. (5ª Avemaría) ¡Bendita eres entre las mujeres! (Lucas 1,42)",
            "11. (6ª Avemaría) Ruega por nosotros, Santa Madre de Dios."
          ]
        }
      }
    }
  };

  // ==================== LÓGICA DEL ROSARIO ====================
  let idiomaActual = 'es';
  let misterioActual = 'joyful';
  let secuencia = [];
  let indiceActual = -1;

  const oracionTitle = document.getElementById('oracion-title');
  const oracionTexto = document.getElementById('oracion-texto');
  const reflexionDiv = document.getElementById('reflexion-fragmento');
  const cuentasContainer = document.getElementById('cuentas-container');
  const contadorTexto = document.getElementById('contador-texto');
  const btnAnterior = document.getElementById('btn-anterior');
  const btnSiguiente = document.getElementById('btn-siguiente');
  const btnReiniciar = document.getElementById('btn-reiniciar');
  const idiomaSelect = document.getElementById('idioma-select');
  const misterioSelect = document.getElementById('misterio-select');
  const infoMisterio = document.getElementById('info-misterio');

  function construirSecuencia() {
    const lang = rosarioContent[idiomaActual];
    const misterioData = lang.mysteries[misterioActual];
    const seq = [];

    // Oraciones iniciales
    seq.push({ tipo: 'oracion', key: 'sign_of_cross', titulo: 'Señal de la Cruz', texto: lang.prayers.sign_of_cross });
    seq.push({ tipo: 'oracion', key: 'versicle', titulo: 'Versículo inicial', texto: lang.prayers.versicle });
    seq.push({ tipo: 'oracion', key: 'creed', titulo: 'Credo', texto: lang.prayers.creed });
    for (let i = 0; i < 3; i++) seq.push({ tipo: 'oracion', key: 'hail_mary', titulo: 'Ave María', texto: lang.prayers.hail_mary });
    seq.push({ tipo: 'oracion', key: 'gloria', titulo: 'Gloria', texto: lang.prayers.gloria });

    // 5 misterios
    for (let m = 0; m < 5; m++) {
      // Anuncio del misterio
      seq.push({ tipo: 'anuncio', misterioIdx: m, titulo: `${m+1}° ${misterioData.title} - ${misterioData.fragments[m].split(':')[0]}` });
      // Padre Nuestro (fragmento índice 0 del misterio)
      seq.push({ tipo: 'oracion', key: 'our_father', titulo: 'Padre Nuestro', texto: lang.prayers.our_father, fragmento: misterioData.fragments[0] });
      // 10 Avemarías (fragmentos 1..10)
      for (let a = 1; a <= 10; a++) {
        seq.push({ tipo: 'oracion', key: 'hail_mary', titulo: 'Ave María', texto: lang.prayers.hail_mary, fragmento: misterioData.fragments[a] });
      }
      seq.push({ tipo: 'oracion', key: 'gloria', titulo: 'Gloria', texto: lang.prayers.gloria });
      seq.push({ tipo: 'oracion', key: 'fatima_prayer', titulo: 'Oración de Fátima', texto: lang.prayers.fatima_prayer });
    }

    // Oraciones finales
    seq.push({ tipo: 'oracion', key: 'salve_regina', titulo: 'Salve Regina', texto: lang.prayers.salve_regina });
    seq.push({ tipo: 'oracion', key: 'pope_intentions', titulo: 'Intenciones del Papa', texto: lang.prayers.pope_intentions });
    seq.push({ tipo: 'oracion', key: 'our_father', titulo: 'Padre Nuestro', texto: lang.prayers.our_father });
    seq.push({ tipo: 'oracion', key: 'hail_mary', titulo: 'Ave María', texto: lang.prayers.hail_mary });
    seq.push({ tipo: 'oracion', key: 'gloria', titulo: 'Gloria', texto: lang.prayers.gloria });
    seq.push({ tipo: 'oracion', key: 'final_sign_of_cross', titulo: 'Señal de la Cruz final', texto: lang.prayers.final_sign_of_cross });

    return seq;
  }

  function actualizarUI() {
    if (indiceActual < 0 || indiceActual >= secuencia.length) {
      oracionTitle.textContent = "Santo Rosario";
      oracionTexto.textContent = "Presiona 'Siguiente' para comenzar.";
      reflexionDiv.textContent = "";
      cuentasContainer.innerHTML = "";
      contadorTexto.textContent = "Inicio";
      btnSiguiente.textContent = "Comenzar";
      btnAnterior.disabled = true;
      if (indiceActual >= secuencia.length) {
        oracionTitle.textContent = "¡Rosario completado!";
        oracionTexto.textContent = "Has rezado todas las oraciones. Que Dios te bendiga.";
        btnSiguiente.textContent = "Reiniciar";
      }
      return;
    }

    const paso = secuencia[indiceActual];
    if (paso.tipo === 'anuncio') {
      oracionTitle.textContent = paso.titulo;
      oracionTexto.textContent = "Medita este misterio mientras rezas...";
      reflexionDiv.textContent = `📖 ${secuencia[indiceActual+1]?.fragmento || ''}`;
      cuentasContainer.innerHTML = "";
      contadorTexto.textContent = "";
    } else if (paso.tipo === 'oracion') {
      oracionTitle.textContent = paso.titulo;
      oracionTexto.textContent = paso.texto;
      reflexionDiv.textContent = paso.fragmento ? `📖 ${paso.fragmento}` : "";

      // Mostrar cuentas para Padre Nuestro y Avemarías dentro de un misterio
      if (paso.key === 'our_father' || paso.key === 'hail_mary') {
        const total = 11; // 1 Padre + 10 Avemarías
        let actual = 0;
        if (paso.key === 'our_father') actual = 1;
        else {
          let cont = 0;
          for (let i = indiceActual; i >= 0; i--) {
            if (secuencia[i].key === 'our_father') break;
            if (secuencia[i].key === 'hail_mary') cont++;
          }
          actual = cont + 1;
        }
        cuentasContainer.innerHTML = '';
        for (let i = 1; i <= total; i++) {
          const div = document.createElement('div');
          div.className = 'cuenta';
          if (i === actual) div.classList.add('active');
          else if (i < actual) div.classList.add('completada');
          div.textContent = i === 1 ? 'P' : i-1;
          cuentasContainer.appendChild(div);
        }
        contadorTexto.textContent = `${actual} de ${total}`;
      } else {
        cuentasContainer.innerHTML = '';
        contadorTexto.textContent = '';
      }
    }

    btnAnterior.disabled = (indiceActual === 0);
    btnSiguiente.textContent = (indiceActual === secuencia.length-1) ? "Finalizar" : "Siguiente";
  }

  function avanzar() {
    if (indiceActual < secuencia.length - 1) {
      indiceActual++;
      actualizarUI();
    } else if (indiceActual === secuencia.length - 1) {
      indiceActual = -1;
      actualizarUI();
    } else {
      indiceActual = 0;
      actualizarUI();
    }
  }
  function retroceder() {
    if (indiceActual > 0) {
      indiceActual--;
      actualizarUI();
    }
  }
  function reiniciar() {
    indiceActual = -1;
    actualizarUI();
  }
  function cargarTodo() {
    secuencia = construirSecuencia();
    indiceActual = -1;
    actualizarUI();
    infoMisterio.textContent = rosarioContent[idiomaActual].mysteries[misterioActual].title;
  }

  // Eventos
  idiomaSelect.addEventListener('change', (e) => { idiomaActual = e.target.value; cargarTodo(); });
  misterioSelect.addEventListener('change', (e) => { misterioActual = e.target.value; cargarTodo(); });
  btnSiguiente.addEventListener('click', avanzar);
  btnAnterior.addEventListener('click', retroceder);
  btnReiniciar.addEventListener('click', reiniciar);

  cargarTodo();
</script>
</body>
</html>
